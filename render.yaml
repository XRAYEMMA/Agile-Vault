databases:
  - name: agile-vault-db
    databaseName: agile_vault
    plan: free

services:
  - type: web
    name: agile-vault
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TATUM_API_KEY
        sync: false
      - key: WALRUS_ENDPOINT
        value: https://publisher.walrus-testnet.walrus.space
      - key: WALRUS_EPOCHS
        value: "1"
      - key: SUI_NETWORK
        value: testnet
      - key: PORT
        value: "10000"
      - key: VITE_TATUM_SUI_RPC_URL
        value: https://sui-testnet.gateway.tatum.io
      - key: DATABASE_URL
        fromDatabase:
          name: agile-vault-db
          property: connectionString
